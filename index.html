<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Transactions Ledger | The Editorial Ledger</title>
    <link href="styles.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main--container">
      <div class="container">
        <div class="sidebar--container">
          <header>
            <h1>The Ledger</h1>
            <p>Sovereign Architect</p>

            <nav class="nav--links">
              <div class="selected">
                <span
                  class="material-symbols-outlined icon"
                  data-icon="dashboard"
                  >dashboard</span
                >

                <a class="selected-a-tag" href="/">Dashboard</a>
              </div>
              <div>
                <span
                  class="material-symbols-outlined icon"
                  data-icon="receipt_long"
                  >receipt_long</span
                >

                <a href="/transactions">Transactions</a>
              </div>
              <div>
                <span
                  class="material-symbols-outlined icon"
                  data-icon="account_balance_wallet"
                  >account_balance_wallet</span
                >
                <a href="/budget">Budget</a>
              </div>
              <div>
                <span
                  class="material-symbols-outlined icon"
                  data-icon="bar_chart"
                  >bar_chart</span
                >

                <a href="/reports">Reports</a>
              </div>
            </nav>
            <button class="btn--new-transaction">
              <span class="material-symbols-outlined icon" data-icon="add"
                >add</span
              >
              New Transaction
            </button>
          </header>
        </div>
        <div class="homepage--container">
          <!-- Top navbar -->
          <div class="top--navbar">
            <form>
              <input placeholder="Search Architecture" type="text" />
              <button class="search-button">
                <span class="material-symbols-outlined" data-icon="search"
                  >search</span
                >
              </button>
            </form>
            <div class="action--bar">
              <span class="material-symbols-outlined" data-icon="notifications"
                >notifications</span
              >
              <span class="material-symbols-outlined" data-icon="settings"
                >settings</span
              >
            </div>
          </div>
          <div class="homepage-body"></div>
        </div>
        <div class="mobile-tabs">
          <div>
            <a href="/">
              <span class="material-symbols-outlined" data-icon="dashboard"
                >dashboard</span
              ></a
            >
          </div>
          <div>
            <a href="/transactions">
              <span class="material-symbols-outlined" data-icon="receipt_long"
                >receipt_long</span
              >
            </a>
          </div>
          <div>
            <a href="/budget">
              <span
                class="material-symbols-outlined"
                data-icon="account_balance_wallet"
                >account_balance_wallet</span
              >
            </a>
          </div>
          <div>
            <a href="/reports">
              <span class="material-symbols-outlined" data-icon="bar_chart"
                >bar_chart</span
              >
            </a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>

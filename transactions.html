<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Transactions Ledger | The Editorial Ledger</title>
    <link href="styles.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app">
      <div class="app__layout">
        <div class="sidebar">
          <header>
            <h1>The Ledger</h1>
            <p>Sovereign Architect</p>

            <nav class="sidebar__nav">
              <div id="navbar--link" class="sidebar__nav-item--active">
                <span
                  class="material-symbols-outlined nav-icon"
                  data-icon="dashboard"
                  >dashboard</span
                >
                <a  href="/">Dashboard</a>
              </div>
              <div id="navbar--link">
                <span
                  class="material-symbols-outlined nav-icon"
                  data-icon="receipt_long"
                  >receipt_long</span
                >
                <a href="/transactions.html">Transactions</a>
              </div>
              <div id="navbar--link">
                <span
                  class="material-symbols-outlined nav-icon"
                  data-icon="account_balance_wallet"
                  >account_balance_wallet</span
                >
                <a href="/budget.html">Budget</a>
              </div>
              <div id="navbar--link">
                <span
                  class="material-symbols-outlined nav-icon"
                  data-icon="bar_chart"
                  >bar_chart</span
                >
                <a href="/reports.html">Reports</a>
              </div>
            </nav>
            <button class="sidebar__add-btn">
              <span class="material-symbols-outlined nav-icon" data-icon="add"
                >add</span
              >
              New Transaction
            </button>
          </header>
        </div>
        <div class="main-content">
          <!-- Top navbar -->
          <div class="topbar">
            <form>
              <input placeholder="Search Architecture" type="text" />
              <button class="topbar__search-btn">
                <span class="material-symbols-outlined" data-icon="search"
                  >search</span
                >
              </button>
            </form>
            <div class="topbar__actions">
              <span class="material-symbols-outlined" data-icon="notifications"
                >notifications</span
              >
              <span class="material-symbols-outlined" data-icon="settings"
                >settings</span
              >
            </div>
          </div>
     
           
           
           
          </div>
        </div>
        <div class="bottom-nav">
          <div>
            <a href="/">
              <span class="material-symbols-outlined" data-icon="dashboard"
                >dashboard</span
              ></a
            >
            <p>Dashboard</p>
          </div>
          <div>
            <a href="/transactions">
              <span class="material-symbols-outlined" data-icon="receipt_long"
                >receipt_long</span
              >
            </a>
            <p>Ledger</p>
          </div>
          <div>
            <a href="/budget">
              <span
                class="material-symbols-outlined"
                data-icon="account_balance_wallet"
                >account_balance_wallet</span
              >
            </a>
            <p>Budget</p>
          </div>
          <div>
            <a href="/reports">
              <span class="material-symbols-outlined" data-icon="bar_chart"
                >bar_chart</span
              >
            </a>
            <p>Reports</p>
          </div>
        </div>
      </div>
    </main>


    <script src="./script.js" defer></script>
  </body>
</html>
